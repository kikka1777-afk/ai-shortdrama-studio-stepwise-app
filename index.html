<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AI短剧分步工作台</title>
<style>
:root{
  --bg:#f5f6f1;
  --ink:#17201c;
  --muted:#65736b;
  --panel:#ffffff;
  --panel-soft:#f0f4ee;
  --line:#d9dfd5;
  --line-strong:#b9c5ba;
  --green:#0e6a59;
  --green-dark:#0a5548;
  --plum:#74415f;
  --amber:#a8642b;
  --red:#a8462e;
  --shadow:0 20px 54px rgba(30,42,35,.13);
}
*{box-sizing:border-box}
html,body{height:100%}
body{
  margin:0;
  color:var(--ink);
  background:var(--bg);
  font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft YaHei",Arial,sans-serif;
  letter-spacing:0;
}
button,input,textarea,select{font:inherit}
button{
  min-height:38px;
  border:1px solid var(--line);
  border-radius:8px;
  padding:8px 12px;
  background:#fff;
  color:var(--ink);
  cursor:pointer;
}
button:hover{border-color:var(--line-strong);background:#fbfcfa}
button:disabled{opacity:.45;cursor:not-allowed}
.primary{background:var(--green);border-color:var(--green);color:#fff}
.primary:hover{background:var(--green-dark);border-color:var(--green-dark)}
.secondary{background:#fbf6fa;border-color:#d9bfce;color:#5d334f}
.danger{background:#fff7f4;border-color:#e0b9aa;color:var(--red)}
.ghost{background:transparent}
.icon-btn{width:38px;padding:0;display:inline-grid;place-items:center}
.shell{
  min-height:100vh;
  display:grid;
  grid-template-rows:64px minmax(0,1fr);
}
header{
  display:flex;
  align-items:center;
  gap:14px;
  padding:0 22px;
  border-bottom:1px solid var(--line);
  background:rgba(255,255,255,.92);
}
.brand{font-size:18px;font-weight:850;white-space:nowrap}
.brand b{color:var(--green)}
.statusline{
  display:flex;
  align-items:center;
  gap:8px;
  color:var(--muted);
  font-size:13px;
}
.status-dot{width:8px;height:8px;border-radius:50%;background:var(--green)}
.spacer{flex:1}
.layout{
  min-height:0;
  display:grid;
  grid-template-columns:306px minmax(0,1fr);
}
.side{
  min-width:0;
  border-right:1px solid var(--line);
  background:#eef2ec;
  display:flex;
  flex-direction:column;
}
.side-head{padding:18px;border-bottom:1px solid var(--line)}
.side-head h2{margin:0 0 6px;font-size:16px}
.side-head p{margin:0;color:var(--muted);font-size:13px;line-height:1.55}
.step-list{padding:14px;display:grid;gap:8px}
.step-card{
  width:100%;
  display:grid;
  grid-template-columns:32px minmax(0,1fr);
  gap:10px;
  align-items:flex-start;
  text-align:left;
  background:#fff;
}
.step-card.active{border-color:var(--green);box-shadow:0 0 0 2px rgba(14,106,89,.12)}
.step-card.done .num{background:var(--green);color:#fff}
.step-card.locked{opacity:.68}
.num{
  width:28px;
  height:28px;
  border-radius:50%;
  display:grid;
  place-items:center;
  background:#e8eee6;
  font-weight:800;
}
.step-card strong{display:block;font-size:14px}
.step-card span{display:block;color:var(--muted);font-size:12px;line-height:1.45;margin-top:2px}
.ai-log{
  min-height:0;
  flex:1;
  overflow:auto;
  padding:14px;
  display:flex;
  flex-direction:column;
  gap:10px;
}
.log-card{
  background:#fff;
  border:1px solid var(--line);
  border-radius:8px;
  padding:12px;
  box-shadow:0 8px 22px rgba(35,48,40,.06);
}
.log-card.user{background:#fffaf7;border-color:#e7caba}
.log-kicker{font-size:12px;color:var(--muted);margin-bottom:5px}
.log-card h3{font-size:14px;margin:0 0 7px}
.log-card p{margin:0;color:#35433b;line-height:1.65;font-size:13px}
.log-card table{
  width:100%;
  border-collapse:collapse;
  margin-top:9px;
  font-size:12px;
}
.log-card th,.log-card td{
  border:1px solid var(--line);
  padding:6px;
  text-align:left;
  vertical-align:top;
}
.log-card th{background:#f5f7f3;color:#435149}
.main{
  min-width:0;
  min-height:0;
  display:grid;
  grid-template-rows:minmax(0,1fr) auto;
}
.page{
  min-height:0;
  overflow:auto;
  padding:22px;
}
.hero{
  display:grid;
  grid-template-columns:minmax(0,1fr) minmax(260px,360px);
  gap:18px;
  align-items:stretch;
  margin-bottom:16px;
}
.page-title{
  background:#fff;
  border:1px solid var(--line);
  border-radius:8px;
  box-shadow:var(--shadow);
  padding:22px;
}
.eyebrow{font-size:12px;color:var(--green);font-weight:850;margin-bottom:8px}
.page-title h1{font-size:28px;margin:0 0 8px}
.page-title p{margin:0;color:var(--muted);line-height:1.65}
.meta-panel{
  background:#fff;
  border:1px solid var(--line);
  border-radius:8px;
  padding:16px;
  display:grid;
  gap:12px;
}
.badge{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  min-height:30px;
  border:1px solid var(--line);
  border-radius:999px;
  padding:5px 10px;
  font-size:12px;
  color:var(--muted);
  background:#fff;
  white-space:nowrap;
}
.badge.done{border-color:#a8cfc4;background:#edf8f5;color:#095d4f}
.badge.run{border-color:#e0c494;background:#fff8eb;color:#8a4d12}
.badge.err{border-color:#e0b7a7;background:#fff7f3;color:#923a24}
.field{display:flex;flex-direction:column;gap:7px}
.field label{font-size:12px;font-weight:800;color:#4c5a52}
.field input,.field select,.field textarea{
  width:100%;
  border:1px solid var(--line);
  border-radius:8px;
  background:#fff;
  color:var(--ink);
  outline:none;
  padding:10px;
}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.chips{display:flex;flex-wrap:wrap;gap:7px}
.chip{
  min-height:30px;
  border:1px solid var(--line);
  border-radius:999px;
  padding:5px 10px;
  background:#fff;
  color:#46544c;
  font-size:12px;
  cursor:pointer;
}
.chip.on{background:#edf8f5;border-color:#9fcbbf;color:#07584b}
.surface{
  background:#fff;
  border:1px solid var(--line);
  border-radius:8px;
  box-shadow:var(--shadow);
  overflow:hidden;
}
.surface-head{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
  padding:14px 16px;
  border-bottom:1px solid var(--line);
  background:#fbfcfa;
}
.surface-head strong{font-size:15px}
.surface-body{padding:16px}
.empty{
  border:1px dashed #bac8bb;
  border-radius:8px;
  padding:26px;
  color:var(--muted);
  background:#fbfcfa;
  line-height:1.7;
}
.prose{white-space:pre-wrap;line-height:1.85;font-size:15px}
.cards{display:grid;gap:12px}
.episode,.asset-group,.shot-block{
  border:1px solid var(--line);
  border-radius:8px;
  overflow:hidden;
  background:#fff;
}
.episode-title,.asset-title,.shot-title{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
  padding:12px 14px;
  border-bottom:1px solid var(--line);
  background:#f6f8f4;
}
.episode-title strong,.asset-title strong,.shot-title strong{font-size:15px}
.episode-body,.asset-body,.shot-body{padding:14px}
.kv-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px;margin-bottom:10px}
.kv{
  border:1px solid var(--line);
  border-radius:8px;
  padding:10px;
  background:#fcfdfb;
}
.kv b{display:block;font-size:12px;color:var(--muted);margin-bottom:5px}
.kv span{line-height:1.55}
.mini{display:flex;flex-wrap:wrap;gap:6px;margin:7px 0}
.mini span{
  border:1px solid var(--line);
  background:#f4f6f2;
  border-radius:999px;
  padding:4px 8px;
  font-size:12px;
  color:#4e5d55;
}
.prompt{
  margin-top:8px;
  padding:10px;
  border-radius:8px;
  background:#111916;
  color:#e6f2eb;
  overflow:auto;
  font-size:12px;
  line-height:1.55;
}
.row-item{border-top:1px solid var(--line);padding:12px 0}
.row-item:first-child{border-top:0;padding-top:0}
.composer{
  border-top:1px solid var(--line);
  background:rgba(255,255,255,.96);
  padding:14px 22px;
}
.composer-inner{
  display:grid;
  grid-template-columns:minmax(0,1fr) auto;
  gap:12px;
  align-items:end;
}
.composer textarea{
  min-height:86px;
  max-height:220px;
  resize:vertical;
  border:1px solid var(--line);
  border-radius:8px;
  padding:12px;
  line-height:1.65;
  outline:none;
  background:#fff;
}
.composer-actions{display:flex;flex-wrap:wrap;gap:8px;justify-content:flex-end}
.helper{font-size:12px;color:var(--muted);margin-top:6px}
.modal{
  position:fixed;
  inset:0;
  display:none;
  place-items:center;
  background:rgba(13,20,16,.38);
  z-index:20;
  padding:18px;
}
.modal.on{display:grid}
.dialog{
  width:min(760px,calc(100vw - 36px));
  max-height:calc(100vh - 36px);
  overflow:auto;
  background:#fff;
  border:1px solid var(--line);
  border-radius:8px;
  box-shadow:var(--shadow);
}
.dialog-head,.dialog-actions{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
  padding:16px;
  border-bottom:1px solid var(--line);
}
.dialog-actions{border-top:1px solid var(--line);border-bottom:0;justify-content:flex-end}
.dialog h2{font-size:18px;margin:0}
.dialog-body{padding:16px}
pre.raw{
  white-space:pre-wrap;
  word-break:break-word;
  background:#101815;
  color:#e7f2ea;
  border-radius:8px;
  padding:14px;
  max-height:480px;
  overflow:auto;
  font-size:12px;
}
.toast{
  position:fixed;
  right:18px;
  bottom:18px;
  z-index:50;
  display:none;
  max-width:min(520px,calc(100vw - 36px));
  border-radius:8px;
  padding:11px 13px;
  color:#fff;
  background:#17211d;
  box-shadow:var(--shadow);
}
.toast.on{display:block}
@media (max-width:1080px){
  .layout{grid-template-columns:1fr}
  .side{border-right:0;border-bottom:1px solid var(--line);max-height:420px}
  .step-list{grid-template-columns:repeat(4,minmax(0,1fr))}
  .ai-log{display:none}
  .hero{grid-template-columns:1fr}
}
@media (max-width:720px){
  header{padding:0 12px}
  .statusline{display:none}
  .page{padding:12px}
  .step-list{grid-template-columns:1fr}
  .composer{padding:12px}
  .composer-inner{grid-template-columns:1fr}
  .composer-actions{justify-content:flex-start}
  .grid-2,.kv-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>
<div class="shell">
  <header>
    <div class="brand">AI<b>短剧</b>分步工作台</div>
    <div class="statusline"><span class="status-dot"></span><span id="topStatus">第 1 步</span></div>
    <div class="spacer"></div>
    <button class="ghost" id="settingsBtn" onclick="openSettings()" style="display:none">设置接口</button>
    <button class="ghost" onclick="resetFlow()">新建流程</button>
  </header>

  <main class="layout">
    <aside class="side">
      <div class="side-head">
        <h2>流程导航</h2>
        <p>每一步都是独立页面。底部输入框负责素材输入、补充要求和修改建议。</p>
      </div>
      <div class="step-list" id="stepList"></div>
      <div class="side-head">
        <h2>AI 摘要</h2>
        <p id="summaryHint">完成一步后会在这里生成摘要和表格。</p>
      </div>
      <div class="ai-log" id="aiLog"></div>
    </aside>

    <section class="main">
      <div class="page">
        <div class="hero">
          <section class="page-title">
            <div class="eyebrow" id="eyebrow">STEP 1</div>
            <h1 id="pageTitle">剧本</h1>
            <p id="pageDesc">把原始素材整理成可拍摄的短剧故事文本。</p>
          </section>
          <section class="meta-panel" id="metaPanel"></section>
        </div>
        <section class="surface">
          <div class="surface-head">
            <strong id="resultTitle">本步产出</strong>
            <span class="badge" id="pageBadge">待生成</span>
          </div>
          <div class="surface-body" id="pageBody"></div>
        </section>
      </div>

      <footer class="composer">
        <div class="composer-inner">
          <div>
            <textarea id="mainInput"></textarea>
            <div class="helper" id="inputHelper"></div>
          </div>
          <div class="composer-actions" id="composerActions"></div>
        </div>
      </footer>
    </section>
  </main>
</div>

<div class="modal" id="settingsModal">
  <div class="dialog">
    <div class="dialog-head">
      <h2>接口设置</h2>
      <button class="icon-btn" onclick="closeSettings()">×</button>
    </div>
    <div class="dialog-body">
      <div class="grid-2">
        <div class="field">
          <label>Provider</label>
          <select id="provider"><option value="openai">OpenAI 兼容</option><option value="azure">Azure OpenAI</option></select>
        </div>
        <div class="field">
          <label>Model / Deployment</label>
          <input id="model" placeholder="gpt-4o-mini" />
        </div>
      </div>
      <div class="field" style="margin-top:10px">
        <label>Base URL / Endpoint</label>
        <input id="baseUrl" placeholder="https://sub2api.aisite.net/v1" />
      </div>
      <div class="field" style="margin-top:10px">
        <label>API Key</label>
        <input id="apiKey" type="password" placeholder="留空则使用 Vercel 环境变量" />
      </div>
    </div>
    <div class="dialog-actions">
      <button onclick="closeSettings()">取消</button>
      <button class="primary" onclick="saveSettings()">保存</button>
    </div>
  </div>
</div>

<div class="modal" id="rawModal">
  <div class="dialog">
    <div class="dialog-head">
      <h2>原始数据</h2>
      <button class="icon-btn" onclick="closeRaw()">×</button>
    </div>
    <div class="dialog-body"><pre class="raw" id="rawData"></pre></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const STYLE_MAP={
  "Theatrical Cinematic":"theatrical cinematic lighting, expressive faces, premium vertical short drama",
  "Realistic Modern":"realistic modern Chinese short-drama style, natural light, grounded production design",
  "Noir Romance":"noir romance mood, high contrast lighting, elegant shadows, vertical composition",
  "Youth Bright":"bright youth drama style, clean color, soft daylight, energetic framing"
};
const TAGS=["都市","逆袭","甜宠","悬疑","复仇","家庭","职场","古风","奇幻","喜剧"];
const SAMPLE_RAW=`林羽在云家做了三年上门女婿。三年来，他端茶倒水、洗衣做饭，受尽全家白眼。岳父云海天嫌他一事无成，妻子云楚楚也从未真正正眼看过他。

这天，云氏集团濒临破产。家宴上，云海天当众羞辱林羽，逼他签下离婚协议。没人知道，三年前隐姓埋名的林羽，正是商业版图横跨半个亚洲的羽盛资本真正掌门人。而此刻唯一能救云氏的神秘金主 L 先生，正是被他们踩在脚下的这个上门女婿。`;
const STEPS=[
  {id:"script",title:"剧本",desc:"从素材到完整故事正文。",hint:"粘贴原始素材、创意、人物设定，或写本步修改建议。"},
  {id:"episodes",title:"分集剧本",desc:"拆成每集标题、时长、角色、钩子和概要。",hint:"可以补充集数节奏、某集重点、删改某条支线。"},
  {id:"storyboard",title:"分镜剧本",desc:"按集拆成可拍摄镜头和画面提示。",hint:"可以要求增加镜头、强化冲突、调整景别或视觉风格。"},
  {id:"assets",title:"美术资产",desc:"提取角色、场景、道具与 image_prompt。",hint:"可以要求补某个角色造型、统一色调或删除不需要的资产。"}
];

let state={
  active:0,
  running:false,
  params:{raw:"",tags:["都市","逆袭","情感"],total:4,ep1:120,dur:75,hook:5,style:"Theatrical Cinematic"},
  outputs:{},
  drafts:{},
  messages:[]
};

function esc(s){return String(s??"").replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[m]));}
function compact(s,n=3600){return String(s||"").slice(0,n);}
function currentStep(){return STEPS[state.active];}
function stepDone(id){return state.outputs[id]!==undefined&&state.outputs[id]!==null;}
function styleFrag(){return STYLE_MAP[state.params.style]||STYLE_MAP["Theatrical Cinematic"];}
function saveWork(){localStorage.setItem("stepwise_state",JSON.stringify(state));}
function loadWork(){try{const saved=JSON.parse(localStorage.getItem("stepwise_state")||"null");if(saved&&saved.params&&saved.outputs) state={...state,...saved,drafts:saved.drafts||{}};}catch(_e){}}
function toast(text){const t=document.getElementById("toast");t.textContent=text;t.classList.add("on");setTimeout(()=>t.classList.remove("on"),2600);}

function init(){
  loadWork();
  initAdminMode();
  if(!state.messages.length){
    state.messages.push({role:"assistant",title:"工作台已就绪",text:"从第 1 步开始，在底部输入框粘贴素材。每完成一步，我会在这里写摘要并附表格。"});
  }
  renderAll();
}
function renderAll(){
  renderStepList();
  renderPage();
  renderInput();
  renderLog();
  saveWork();
}
function renderStepList(){
  document.getElementById("stepList").innerHTML=STEPS.map((s,i)=>{
    const locked=i>0&&!stepDone(STEPS[i-1].id);
    const cls=["step-card",i===state.active?"active":"",stepDone(s.id)?"done":"",locked?"locked":""].join(" ");
    return `<button class="${cls}" onclick="goStep(${i})">
      <span class="num">${stepDone(s.id)?"✓":i+1}</span>
      <span><strong>${esc(s.title)}</strong><span>${esc(s.desc)}</span></span>
    </button>`;
  }).join("");
  document.getElementById("topStatus").textContent=`第 ${state.active+1} / ${STEPS.length} 步 · ${currentStep().title}`;
}
function renderPage(){
  const s=currentStep();
  document.getElementById("eyebrow").textContent=`STEP ${state.active+1}`;
  document.getElementById("pageTitle").textContent=s.title;
  document.getElementById("pageDesc").textContent=s.desc;
  document.getElementById("resultTitle").textContent=`${s.title}产出`;
  const badge=document.getElementById("pageBadge");
  badge.className="badge"+(state.running?" run":stepDone(s.id)?" done":"");
  badge.textContent=state.running?"生成中":stepDone(s.id)?"已完成":"待生成";
  document.getElementById("metaPanel").innerHTML=renderMetaPanel();
  document.getElementById("pageBody").innerHTML=renderResult(s.id);
}
function renderMetaPanel(){
  return `<div class="field">
    <label>题材标签</label>
    <div class="chips">${TAGS.map(t=>`<span class="chip ${state.params.tags.includes(t)?"on":""}" onclick="toggleTag('${esc(t)}')">${esc(t)}</span>`).join("")}</div>
  </div>
  <div class="grid-2">
    <div class="field"><label>目标集数</label><input id="totalInput" type="number" min="1" max="12" value="${esc(state.params.total)}" onchange="collectMeta()"></div>
    <div class="field"><label>钩子秒数</label><input id="hookInput" type="number" min="3" max="15" value="${esc(state.params.hook)}" onchange="collectMeta()"></div>
    <div class="field"><label>第 1 集</label><input id="ep1Input" type="number" min="30" max="300" value="${esc(state.params.ep1)}" onchange="collectMeta()"></div>
    <div class="field"><label>其余每集</label><input id="durInput" type="number" min="30" max="240" value="${esc(state.params.dur)}" onchange="collectMeta()"></div>
  </div>
  <div class="field">
    <label>统一画风</label>
    <select id="styleInput" onchange="collectMeta()">${Object.keys(STYLE_MAP).map(k=>`<option ${state.params.style===k?"selected":""}>${esc(k)}</option>`).join("")}</select>
  </div>
  <button onclick="loadSample()">载入样例素材</button>`;
}
function renderResult(stepId){
  if(!stepDone(stepId)){
    const prev=STEPS[state.active-1];
    const dependency=prev&&!stepDone(prev.id)?`请先完成「${prev.title}」。`:"底部输入框已经准备好。";
    return `<div class="empty">${dependency}<br>${esc(currentStep().hint)}</div>`;
  }
  if(stepId==="script") return `<div class="prose">${esc(state.outputs.script)}</div>`;
  if(stepId==="episodes") return renderEpisodes(state.outputs.episodes);
  if(stepId==="storyboard") return renderStoryboard(state.outputs.storyboard);
  return renderAssets(state.outputs.assets);
}
function renderEpisodes(data){
  const eps=data.episodes||[];
  return `<div class="cards">${eps.map(ep=>`<article class="episode">
    <div class="episode-title"><strong>EP${esc(ep.ep_number)} · ${esc(ep.title||"未命名")}</strong><span class="badge">${esc(ep.duration_seconds||"")} 秒</span></div>
    <div class="episode-body">
      <div class="kv-grid">
        <div class="kv"><b>出场角色</b><span>${esc((ep.characters||[]).join("、")||"未列出")}</span></div>
        <div class="kv"><b>结尾钩子</b><span>${esc(ep.hook||"")}</span></div>
      </div>
      <div class="prose">${esc(ep.outline||"")}</div>
    </div>
  </article>`).join("")}</div>`;
}
function renderStoryboard(data){
  const eps=data.episodes||[];
  return `<div class="cards">${eps.map(ep=>`<article class="shot-block">
    <div class="shot-title"><strong>EP${esc(ep.ep_number)} · 分镜</strong><span class="badge">${(ep.shots||[]).length} 镜头</span></div>
    <div class="shot-body">${(ep.shots||[]).map(sh=>`<div class="row-item">
      <strong>镜头 ${esc(sh.shot_number||"")}</strong>
      <div class="mini">${sh.duration_seconds?`<span>${esc(sh.duration_seconds)} 秒</span>`:""}${sh.shot_size?`<span>${esc(sh.shot_size)}</span>`:""}${sh.camera?`<span>${esc(sh.camera)}</span>`:""}</div>
      <div class="prose">${esc(sh.visual||"")}</div>
      ${sh.audio_or_caption?`<div class="kv" style="margin-top:8px"><b>台词/字幕/声音</b><span>${esc(sh.audio_or_caption)}</span></div>`:""}
      ${sh.purpose?`<div class="kv" style="margin-top:8px"><b>剧情作用</b><span>${esc(sh.purpose)}</span></div>`:""}
      ${sh.visual_prompt?`<div class="prompt">${esc(sh.visual_prompt)}</div>`:""}
    </div>`).join("")}</div>
  </article>`).join("")}</div>`;
}
function renderAssets(data){
  const groups=data.groups||[];
  return `<div class="cards">${groups.map(g=>`<article class="asset-group">
    <div class="asset-title"><strong>${esc(g.category||"资产组")}</strong><span class="badge">${(g.items||[]).length} 项</span></div>
    <div class="asset-body">${(g.items||[]).map(item=>`<div class="row-item">
      <strong>${esc(item.name||"未命名资产")}</strong>
      <div class="mini">${item.tag?`<span>${esc(item.tag)}</span>`:""}${(item.appears_in_episodes||[]).length?`<span>EP ${(item.appears_in_episodes||[]).join(", ")}</span>`:""}</div>
      ${item.note?`<div class="prose">${esc(item.note)}</div>`:""}
      ${item.image_prompt?`<div class="prompt">${esc(item.image_prompt)}</div>`:""}
    </div>`).join("")}</div>
  </article>`).join("")}</div>`;
}
function renderInput(){
  const s=currentStep();
  const input=document.getElementById("mainInput");
  input.placeholder=state.active===0&&!stepDone("script")?"粘贴原始素材 / 创意 / 人物设定，然后点击生成剧本。":`写给「${s.title}」的修改建议或补充要求。`;
  input.value=state.drafts[s.id]||"";
  input.oninput=()=>{state.drafts[s.id]=input.value;saveWork();};
  document.getElementById("inputHelper").textContent=s.hint;
  const prev=STEPS[state.active-1];
  const canGenerate=!state.running&&(!prev||stepDone(prev.id));
  const done=stepDone(s.id);
  const hasDraft=!!(state.drafts[s.id]||"").trim();
  const primaryLabel=done&&hasDraft?"应用修改建议":done?"重跑本步":"生成本步";
  document.getElementById("composerActions").innerHTML=[
    `<button class="primary" ${canGenerate?"":"disabled"} onclick="primaryAction()">${primaryLabel}</button>`,
    done&&state.active<STEPS.length-1?`<button class="secondary" onclick="continueNext()">继续下一步</button>`:"",
    done?`<button onclick="openRaw('${s.id}')">查看原始数据</button>`:"",
    state.active>0?`<button onclick="goStep(${state.active-1})">返回上一步</button>`:""
  ].filter(Boolean).join("");
}
function renderLog(){
  document.getElementById("aiLog").innerHTML=state.messages.map(m=>`<div class="log-card ${m.role}">
    <div class="log-kicker">${m.role==="user"?"你":"AI"}</div>
    ${m.title?`<h3>${esc(m.title)}</h3>`:""}
    ${m.text?`<p>${esc(m.text)}</p>`:""}
    ${m.table?renderLogTable(m.table):""}
  </div>`).join("");
  const box=document.getElementById("aiLog");
  box.scrollTop=box.scrollHeight;
}
function renderLogTable(table){
  return `<table><thead><tr>${table.headers.map(h=>`<th>${esc(h)}</th>`).join("")}</tr></thead><tbody>${table.rows.map(r=>`<tr>${r.map(c=>`<td>${esc(c)}</td>`).join("")}</tr>`).join("")}</tbody></table>`;
}
function addMessage(role,data){state.messages.push({role,created:Date.now(),...data});renderAll();}

function collectMeta(){
  const total=document.getElementById("totalInput"); if(total) state.params.total=Number(total.value)||4;
  const hook=document.getElementById("hookInput"); if(hook) state.params.hook=Number(hook.value)||5;
  const ep1=document.getElementById("ep1Input"); if(ep1) state.params.ep1=Number(ep1.value)||120;
  const dur=document.getElementById("durInput"); if(dur) state.params.dur=Number(dur.value)||75;
  const style=document.getElementById("styleInput"); if(style) state.params.style=style.value;
  saveWork();
}
function toggleTag(tag){
  const set=new Set(state.params.tags);
  set.has(tag)?set.delete(tag):set.add(tag);
  state.params.tags=[...set];
  renderAll();
}
function goStep(i){
  if(i<0||i>=STEPS.length) return;
  state.active=i;
  renderAll();
}
function loadSample(){
  state.active=0;
  state.params.raw=SAMPLE_RAW;
  state.drafts.script=SAMPLE_RAW;
  state.params.tags=["都市","逆袭","情感"];
  addMessage("user",{text:"载入样例素材"});
}
function resetFlow(){
  state.outputs={};
  state.messages=[];
  state.drafts={script:state.params.raw||""};
  state.active=0;
  state.messages.push({role:"assistant",title:"已新建流程",text:"素材参数已保留，可以从第 1 步重新生成。"});
  renderAll();
}
function continueNext(){
  if(state.active>=STEPS.length-1) return;
  state.active+=1;
  renderAll();
}
async function primaryAction(){
  const step=currentStep();
  const input=(state.drafts[step.id]||"").trim();
  if(step.id==="script"&&!stepDone("script")){
    if(!input){toast("请先在底部输入框填写素材。");return;}
    state.params.raw=input;
  }
  if(stepDone(step.id)&&input){
    await reviseStep(step.id,input);
  }else{
    await runStep(step.id);
  }
}
async function runStep(stepId){
  collectMeta();
  const idx=STEPS.findIndex(s=>s.id===stepId);
  const prev=STEPS[idx-1];
  if(prev&&!stepDone(prev.id)){toast(`请先完成「${prev.title}」。`);return;}
  state.running=true;
  state.active=idx;
  state.messages.push({role:"user",text:`生成：${STEPS[idx].title}`});
  renderAll();
  try{
    const raw=await generateStep(stepId);
    state.outputs[stepId]=STEPS[idx].id==="script"?raw.trim():parseJSON(raw);
    state.drafts[stepId]="";
    addCompletionMessage(stepId);
  }catch(err){
    addFailureMessage(stepId,err);
  }finally{
    state.running=false;
    renderAll();
  }
}
async function reviseStep(stepId,instruction){
  const idx=STEPS.findIndex(s=>s.id===stepId);
  state.running=true;
  state.active=idx;
  state.messages.push({role:"user",text:`修改「${STEPS[idx].title}」：${instruction}`});
  renderAll();
  try{
    const existing=typeof state.outputs[stepId]==="string"?state.outputs[stepId]:JSON.stringify(state.outputs[stepId]);
    const wantJSON=stepId!=="script";
    const sys=wantJSON?`你是${STEPS[idx].title}修订助手。按用户要求修改已有 JSON，只返回同一结构的完整 JSON，不要解释。`:`你是剧本修订助手。按用户要求修改已有剧本文本，只返回正文，不要解释。`;
    const user=`【修改建议】${instruction}\n【已有内容】\n${compact(existing,5200)}`;
    const raw=await callLLM(sys,user,wantJSON);
    state.outputs[stepId]=wantJSON?parseJSON(raw):raw.trim();
    state.drafts[stepId]="";
    addCompletionMessage(stepId,true);
  }catch(err){
    addFailureMessage(stepId,err);
  }finally{
    state.running=false;
    renderAll();
  }
}
async function generateStep(stepId){
  const p=state.params;
  const tags=p.tags.length?JSON.stringify(p.tags):"未指定";
  if(stepId==="script"){
    return callLLM(prompts().script,`【题材标签】${tags}\n【原始素材】\n${compact(p.raw)}`,false);
  }
  if(stepId==="episodes"){
    return callLLM(prompts().episodes,`【目标集数】${p.total}\n【第1集秒数】${p.ep1}\n【其余每集秒数】${p.dur}\n【结尾钩子秒数】${p.hook}\n【剧本】\n${compact(state.outputs.script)}`,true);
  }
  if(stepId==="storyboard"){
    return callLLM(prompts().storyboard,`【画风】${p.style}\n【剧本】\n${compact(state.outputs.script,1800)}\n【分集剧本】\n${compact(JSON.stringify(state.outputs.episodes),3200)}`,true);
  }
  return callLLM(prompts().assets,`【画风】${p.style}\n【剧本】\n${compact(state.outputs.script,1500)}\n【分集剧本】\n${compact(JSON.stringify(state.outputs.episodes),2600)}\n【分镜剧本】\n${compact(JSON.stringify(state.outputs.storyboard),3200)}`,true);
}
function prompts(){
  const p=state.params;
  const tags=p.tags.length?JSON.stringify(p.tags):"未指定";
  return {
    script:`# Role: 短剧剧本 Agent
把用户素材重构成可拍摄短剧故事。中文输出，600-900字。保留核心意图，强化开场冲突、人物欲望、反转和结尾钩子。不要分集，不要写解释。题材参考：${tags}。`,
    episodes:`# Role: 分集剧本 Agent
把剧本拆成结构化分集剧本。最多输出 ${Math.min(Number(p.total)||4,8)} 集。中文字段。严格输出 JSON，不要代码块。
格式：{"total_episodes":4,"episodes":[{"ep_number":1,"title":"","duration_seconds":120,"characters":[""],"hook":"","outline":""}]}`,
    storyboard:`# Role: 分镜剧本 Agent
把分集剧本拆成可拍摄关键分镜。每集输出 3-5 个镜头。中文 visual，英文 visual_prompt，并在每个 visual_prompt 结尾加入 "${styleFrag()} --ar 9:16"。严格输出 JSON，不要代码块。
格式：{"episodes":[{"ep_number":1,"shots":[{"shot_number":1,"duration_seconds":8,"shot_size":"近景","camera":"手持推进","visual":"","audio_or_caption":"","purpose":"","visual_prompt":""}]}]}`,
    assets:`# Role: 美术资产 Agent
根据剧本、分集和分镜提取真正需要统一设计或单独出图的视觉资产。最多 4 个资产组，每组最多 5 项。每项 image_prompt 使用英文，并以 "${styleFrag()} --ar 9:16" 结尾。严格输出 JSON，不要代码块。
格式：{"groups":[{"category":"角色造型","items":[{"name":"","tag":"","note":"","appears_in_episodes":[1],"image_prompt":""}]}]}`
  };
}
async function callLLM(system,user,wantJSON){
  const res=await fetch("/api/generate",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      provider:localStorage.getItem("oa_provider")||"openai",
      key:localStorage.getItem("oa_key")||"",
      base:localStorage.getItem("oa_base")||"",
      model:localStorage.getItem("oa_model")||"gpt-4o-mini",
      system,user,wantJSON
    })
  });
  const data=await res.json().catch(()=>({error:"接口返回不是 JSON"}));
  if(!res.ok||data.error) throw new Error(data.error||"生成失败");
  return data.content||"";
}
function parseJSON(s){
  let t=String(s||"").trim().replace(/^```json/i,"").replace(/^```/,"").replace(/```$/,"").trim();
  const first=Math.min(...["{","["].map(ch=>{const i=t.indexOf(ch);return i<0?Infinity:i;}));
  if(Number.isFinite(first)) t=t.slice(first);
  const last=Math.max(t.lastIndexOf("}"),t.lastIndexOf("]"));
  if(last>0){try{return JSON.parse(t.slice(0,last+1));}catch(_e){}}
  try{return JSON.parse(t);}catch(_e){}
  return JSON.parse(repairTruncatedJSON(t));
}
function repairTruncatedJSON(t){
  let out="",stack=[],inStr=false,escp=false;
  for(const ch of String(t||"")){
    out+=ch;
    if(inStr){
      if(escp){escp=false;continue;}
      if(ch==="\\"){escp=true;continue;}
      if(ch==="\"") inStr=false;
      continue;
    }
    if(ch==="\""){inStr=true;continue;}
    if(ch==="{"||ch==="[") stack.push(ch);
    else if(ch==="}"||ch==="]"){
      const need=ch==="}"?"{":"[";
      if(stack[stack.length-1]===need) stack.pop();
    }
  }
  if(inStr) out+="\"";
  out=out.replace(/,\s*$/,"");
  while(stack.length) out+=stack.pop()==="{"?"}":"]";
  return out;
}
function addCompletionMessage(stepId,revision=false){
  const summary=summarizeStep(stepId,state.outputs[stepId],revision);
  state.messages.push({role:"assistant",...summary});
}
function addFailureMessage(stepId,err){
  const msg=String(err?.message||err||"生成失败");
  state.messages.push({
    role:"assistant",
    title:`${STEPS.find(s=>s.id===stepId).title}生成失败`,
    text:msg.includes("未配置 API Key")?"新 Vercel 项目还没有配置 OPENAI_API_KEY / OPENAI_BASE_URL，已停止写入结果。":"上游没有成功返回，本步没有写入本地兜底结果，请稍后重试或检查接口配置。",
    table:{headers:["项目","状态"],rows:[["步骤",STEPS.find(s=>s.id===stepId).title],["错误",msg.slice(0,160)]]}
  });
}
function summarizeStep(stepId,out,revision){
  const prefix=revision?"已按修改建议更新":"已完成";
  if(stepId==="script"){
    const text=String(out||"");
    return {title:`剧本${prefix}`,text:"故事正文已经生成，可以继续拆分成分集剧本。",table:{headers:["项目","结果"],rows:[["文本长度",`${text.length} 字`],["开场片段",text.slice(0,48)],["下一步","分集剧本"]]}};
  }
  if(stepId==="episodes"){
    const eps=out.episodes||[];
    return {title:`分集剧本${prefix}`,text:`共 ${eps.length} 集，每集包含时长、角色、概要和结尾钩子。`,table:{headers:["集数","标题","钩子"],rows:eps.slice(0,5).map(e=>[`EP${e.ep_number}`,e.title||"",e.hook||""])}};
  }
  if(stepId==="storyboard"){
    const eps=out.episodes||[];
    return {title:`分镜剧本${prefix}`,text:`覆盖 ${eps.length} 集，共 ${eps.reduce((n,e)=>n+(e.shots||[]).length,0)} 个关键镜头。`,table:{headers:["集数","镜头数","首镜头"],rows:eps.slice(0,5).map(e=>[`EP${e.ep_number}`,(e.shots||[]).length,(e.shots||[])[0]?.visual||""])}};
  }
  const groups=out.groups||[];
  return {title:`美术资产${prefix}`,text:`整理出 ${groups.length} 个资产组，每项包含 image_prompt。`,table:{headers:["资产组","数量","示例"],rows:groups.map(g=>[g.category||"",String((g.items||[]).length),(g.items||[]).slice(0,2).map(i=>i.name).join("、")])}};
}
function openRaw(stepId){
  if(!stepDone(stepId)){toast("这一步还没有数据。");return;}
  const value=state.outputs[stepId];
  document.getElementById("rawData").textContent=typeof value==="string"?value:JSON.stringify(value,null,2);
  document.getElementById("rawModal").classList.add("on");
}
function closeRaw(){document.getElementById("rawModal").classList.remove("on");}
function initAdminMode(){
  const params=new URLSearchParams(location.search);
  if(params.get("admin")==="1") localStorage.setItem("admin_settings","1");
  if(params.get("admin")==="0") localStorage.removeItem("admin_settings");
  document.getElementById("settingsBtn").style.display=localStorage.getItem("admin_settings")==="1"?"inline-flex":"none";
}
function openSettings(){
  document.getElementById("provider").value=localStorage.getItem("oa_provider")||"openai";
  document.getElementById("model").value=localStorage.getItem("oa_model")||"gpt-4o-mini";
  document.getElementById("baseUrl").value=localStorage.getItem("oa_base")||"";
  document.getElementById("apiKey").value=localStorage.getItem("oa_key")||"";
  document.getElementById("settingsModal").classList.add("on");
}
function closeSettings(){document.getElementById("settingsModal").classList.remove("on");}
function normalizeBaseInput(v){
  let b=String(v||"").trim();
  if(!b) return "";
  b=b.replace(/\/chat\/completions\/?$/i,"").replace(/\/+$/,"");
  try{
    const u=new URL(b);
    const version=u.pathname.match(/^(.*?\/v\d+)(?:\/.*)?$/i);
    if(version){u.pathname=version[1];return u.toString().replace(/\/+$/,"");}
    const clean=u.pathname.replace(/\/+$/,"");
    const dashboard=!clean||clean==="/"||/\/(?:login|dashboard|console|admin|app|home)$/i.test(clean);
    u.pathname=(dashboard?"":clean)+"/v1";
    return u.toString().replace(/\/+$/,"");
  }catch(_e){return b;}
}
function saveSettings(){
  localStorage.setItem("oa_provider",document.getElementById("provider").value);
  localStorage.setItem("oa_model",document.getElementById("model").value.trim()||"gpt-4o-mini");
  localStorage.setItem("oa_base",normalizeBaseInput(document.getElementById("baseUrl").value));
  localStorage.setItem("oa_key",document.getElementById("apiKey").value.trim());
  closeSettings();
  toast("接口设置已保存。");
}
document.addEventListener("DOMContentLoaded",init);
</script>
